name: Sync Upstream

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream master
        run: |
          git remote add upstream https://github.com/piroz/framer-framer.git
          git fetch upstream master
          git merge upstream/master --ff-only
          git push origin master

