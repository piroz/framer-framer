name: Release Publish

on:
  workflow_call:
    inputs:
      package-dir:
        description: "Package directory to publish (e.g. packages/core)"
        required: true
        type: string

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: [ci]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build core (dependency for react/vue)
        if: inputs.package-dir != 'packages/core'
        run: npm run build -w packages/core

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ${{ inputs.package-dir }}
